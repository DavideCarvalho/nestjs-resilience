    requires:
      - "@nestjs/common"
      - "@nestjs/core"
  - name: resilience-store
    package: "@dudousxd/nestjs-resilience"
    package_dir: packages/core
    path: packages/core/skills/resilience-store/SKILL.md
    type: core
  - name: resilience-store-redis
    package: "@dudousxd/nestjs-resilience-store-redis"
    package_dir: packages/store-redis
    path: packages/store-redis/skills/resilience-store-redis/SKILL.md
    type: core
  - name: resilience-telescope
    package: "@dudousxd/nestjs-resilience-telescope"
